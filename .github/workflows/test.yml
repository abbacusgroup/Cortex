name: tests

# Bundle 9 / C9: GitHub Actions CI workflow.
#
# Runs the full Cortex test suite on every push and pull request to ``main``.
# The Linux job is cheap and runs on every commit. Integration tests that
# rely on macOS-only tooling (``lsof +D``, ``launchctl``, POSIX signal
# semantics, ``ps`` flag set) carry their own ``skipif`` at module level
# and skip cleanly here. The macOS job runs on a daily schedule and on
# manual dispatch so the macOS-only suite is exercised at least once a
# day without paying the macOS runner premium on every push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — runs the macOS job for the macOS-only suite.
    - cron: "0 6 * * *"
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Linux (3.13) — fast suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv venv
          uv sync --group dev --extra embeddings

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run pytest
        # The darwin-only integration tests carry their own skipif and
        # will be reported as ``skipped`` here. xdist parallelizes the
        # remaining suite for speed; the ``phase2_concurrency`` group
        # ensures lock-test classes that spawn real subprocesses run
        # serialized within a single worker (Bundle 9 / F.1).
        env:
          # Bundle 9.1: disable Rich color output and force a wide
          # terminal. GitHub Actions exports FORCE_COLOR which makes
          # typer/click emit ANSI escape codes inside the captured
          # help output, and the default narrow COLUMNS causes line
          # wrapping that sometimes splits option names. Bundle 9.2
          # switched to handling this at the test level (ANSI strip
          # in the assertion), but the env vars are kept for safety.
          NO_COLOR: "1"
          COLUMNS: "200"
          # Bundle 9.4: slow CI runners need a longer probe timeout
          # for the ``_probe_mcp_lazy`` path when a CLI subprocess
          # (e.g. ``cortex capture``) probes a freshly-spawned MCP
          # server. 30s is still well under the 30s singleton so the
          # fast-fail trade-off is acceptable in CI.
          CORTEX_PROBE_TIMEOUT_SECONDS: "30"
          # Bundle 10.6: cold-start ``cortex capture`` on the slow
          # GitHub Actions macOS runner can exceed the 30s default
          # timeout on the singleton CLI client when the embedding
          # model is loading and 3 xdist workers are racing for CPU.
          # 60s gives that case the breathing room it needs without
          # masking real hangs (which are still bounded by the
          # _run_cli 120s wall-clock timeout at the test layer).
          CORTEX_MCP_CLIENT_TIMEOUT_SECONDS: "60"
        run: uv run pytest tests/ -q -n auto --tb=short

  test-macos:
    name: macOS (3.13) — full suite incl. integration
    # Only run on schedule, manual dispatch, or push to main. Skip for
    # PRs from forks (which can't access the macOS runner pool cheaply).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv venv
          uv sync --group dev --extra embeddings

      - name: Run pytest (full suite, incl. macOS-only integration)
        env:
          NO_COLOR: "1"
          COLUMNS: "200"
          CORTEX_PROBE_TIMEOUT_SECONDS: "30"
          # Bundle 10.6: see Linux job comment — 60s singleton timeout
          # keeps cold-start capture pipeline calls inside the budget
          # even when three xdist workers are competing for CPU.
          CORTEX_MCP_CLIENT_TIMEOUT_SECONDS: "60"
        run: uv run pytest tests/ -q -n auto --tb=short
